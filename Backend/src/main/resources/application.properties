spring.application.name=gadang

# ── DB ──────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/gadang?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:ssafy}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:ssafy}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# schema.sql 매 기동 시 실행. CREATE TABLE IF NOT EXISTS 이므로 기존 DB 도 안전
# 기존 DB 에 컬럼이 없으면 migration-2026-06-25.sql 을 Workbench에서 1회 실행
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# ── MyBatis ─────────────────────────────────────────
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.type-aliases-package=com.gadang
mybatis.configuration.map-underscore-to-camel-case=true

# ── 외부 API Key (실제 키는 여기에 넣지 말 것 → 환경변수 사용) ──
kakao.api.key=${KAKAO_REST_API_KEY:}
# 카카오 앱에서 Client Secret을 활성화한 경우에만 입력 (비활성화면 빈 값 유지)
# 콘솔 → 앱 설정 → 보안 탭에서 확인 (REST API 키와 다른 별도 값)
kakao.client-secret=${KAKAO_CLIENT_SECRET:}
odsay.api.key=${ODSAY_API_KEY:}
naver.client-id=${NAVER_CLIENT_ID:}
naver.client-secret=${NAVER_CLIENT_SECRET:}
tour.api.key=${TOUR_API_KEY:}

# 공공데이터포털 통합 키 (tour.api.key와 동일 계정 키 — 디코딩 버전 == 그대로 사용)
# 활용신청: TAGO 시외버스정보 / TAGO 고속버스정보 / 한국철도공사 열차운행정보
datago.api.key=${DATAGO_API_KEY:}

# ── OAuth2 소셜 로그인 ───────────────────────────────
# 콜백 URL을 각 개발자 콘솔에 등록 필요
# 네이버: http://localhost:8080/api/auth/naver/callback
# 카카오: http://localhost:8080/api/auth/kakao/callback
gadang.oauth.backend-url=${GADANG_BACKEND_URL:http://localhost:8080}
gadang.oauth.frontend-url=${GADANG_FRONTEND_URL:http://localhost:5173}

# ── JWT ─────────────────────────────────────────────
jwt.secret=${JWT_SECRET:gadang-secret-key-for-development-only}
jwt.expiration=86400000

# Default local admin account. Override with environment-specific properties before production use.
gadang.admin.seed-email=${GADANG_ADMIN_EMAIL:admin@gadang.local}
gadang.admin.seed-password=${GADANG_ADMIN_PASSWORD:Admin1234!}
gadang.admin.seed-nickname=${GADANG_ADMIN_NICKNAME:admin}

# ── Spring AI (GMS · OpenAI 호환) ────────────────────
# 실제 키는 환경변수 GMS_KEY 로 주입 (만료: 2026-06-26)
spring.ai.openai.base-url=https://gms.ssafy.io/gmsapi/api.openai.com/v1
spring.ai.openai.api-key=${GMS_KEY:disabled}
spring.ai.openai.chat.options.model=gpt-4.1-mini
spring.ai.openai.chat.options.temperature=0.3
# 임베딩은 FastAPI(RAG)에서 처리 — Spring 측 임베딩 자동설정 비활성화
spring.ai.openai.embedding.enabled=false

# ── RAG 서버 (FastAPI) ───────────────────────────────
gadang.rag.base-url=${RAG_BASE_URL:http://localhost:8000}

# ── 캐시 (Phase 2) ───────────────────────────────────
spring.cache.type=caffeine
# 슬라이딩 TTL: 조회할 때마다 1시간 연장, 최대 크기 500개 (LRU 방식 자동 eviction)
spring.cache.caffeine.spec=maximumSize=500,expireAfterAccess=3600s
spring.cache.cache-names=tourDetail,weather,festivals,blogCount,naverLocal,datalabTrend,odsayRoute,intercityBus,trainStation,trainServiceTime,regionImages,placeCandidates

# ── 로그 ────────────────────────────────────────────
logging.level.com.gadang=DEBUG
logging.level.org.springframework.cache=DEBUG
